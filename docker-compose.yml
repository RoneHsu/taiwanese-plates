services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: compare
      POSTGRES_PASSWORD: compare123
      POSTGRES_DB: compare_money
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compare -d compare_money"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
